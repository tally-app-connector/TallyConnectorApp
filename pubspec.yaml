name: tally_connector
description: "Tally ERP Data Connector App"
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  collection: ^1.18.0
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # HTTP & API
  http: ^1.2.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Form Validation
  email_validator: ^2.1.17
  sqflite_common_ffi: ^2.4.0+1
  sqflite: ^2.4.2
  sqlite3: ^3.1.2
  sqlite3_flutter_libs: ^0.5.24
  xml: ^6.6.1
  postgres: ^3.5.9
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true